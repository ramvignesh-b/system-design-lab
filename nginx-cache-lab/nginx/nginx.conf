events {}

http {
    # Cache zone for responses proxied from backend.
    # Gotcha: inactive is access-based eviction, not an absolute TTL.
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=my_cache:10m max_size=1g inactive=60m use_temp_path=off;

    upstream backend_servers {
        server backend:3000;
    }

    server {
        listen 80;

        location /api/data {
            proxy_cache my_cache;

            # In this lab, proxy controls cache policy regardless of backend headers.
            proxy_ignore_headers Cache-Control Expires;

            # Cache successful responses for 30s.
            proxy_cache_valid 200 30s;

            # Prevent thundering herd: one request populates cache while others wait.
            proxy_cache_lock on;

            # Expose cache status to make behavior observable in curl/browser.
            add_header X-Proxy-Cache $upstream_cache_status;

            proxy_pass http://backend_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/nocache {
            # Route to same backend path but without cache directives.
            rewrite ^/api/nocache /api/data break;

            add_header X-Proxy-Cache BYPASS;

            proxy_pass http://backend_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
