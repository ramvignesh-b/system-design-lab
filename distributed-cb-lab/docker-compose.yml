services:
  redis:
    image: redis:alpine
    ports:
      - "6378:6379"

  app:
    build:
      context: .
    ports:
      - "3001:3001"
      - "4001:4001"
    depends_on:
      - redis
    volumes:
      # Gotcha (SELinux): :z relabels bind mount so container can read/write it.
      - .:/app:z
      - /app/node_modules
    environment:
      - REDIS_URL=redis://redis:6379
    command: npm start
